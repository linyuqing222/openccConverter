name: release-please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  # Maintain the rolling "release PR" (CHANGELOG + version bump). When that PR is
  # merged, this step also creates the git tag and the GitHub Release.
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # Tags created by release-please use the GITHUB_TOKEN, so they do not trigger
  # the tag-based `build addon` workflow. Build and attach the artifacts here
  # instead, only once a release has actually been cut.
  publish:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Install dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y gettext
          uv sync
      - name: Build add-on
        run: uv run scons && uv run scons pot
      - name: Attach artifacts and checksum to the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: |
          checksum="$(sha256sum *.nvda-addon)"
          gh release upload "$TAG" *.nvda-addon *.pot --clobber
          gh release view "$TAG" --json body -q .body > body.md
          {
            printf '\n\n---\n\nSHA256:\n\n'
            printf '```\n%s\n```\n' "$checksum"
          } >> body.md
          gh release edit "$TAG" --notes-file body.md

  # release-please can bump the version in buildVars.py but cannot write the
  # generated notes into it, so the store "What's new" (addon_changelog) goes
  # stale. Mirror the latest changelog.md section into buildVars.py on the open
  # release PR branch, before it is merged and tagged. No-op when no release PR
  # is open. Pushing to the release branch (not main) does not re-trigger this
  # workflow; release-please re-creates the branch on later pushes and this job
  # re-applies, so it self-heals.
  sync-changelog:
    needs: release-please
    runs-on: ubuntu-latest
    # A job-level permissions block replaces the workflow-level grant, so
    # contents: write must be re-declared here.
    permissions:
      contents: write
      pull-requests: read
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Configure git identity
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
      - name: Find the open release PR
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          branch="$(gh pr list --state open --label 'autorelease: pending' \
            --json headRefName -q '.[0].headRefName')"
          echo "branch=$branch" >> "$GITHUB_OUTPUT"
      - name: Sync addon_changelog onto the release PR branch
        if: ${{ steps.pr.outputs.branch != '' }}
        env:
          BRANCH: ${{ steps.pr.outputs.branch }}
        run: |
          git fetch origin "$BRANCH:$BRANCH"
          git switch "$BRANCH"
          python3 scripts/sync_addon_changelog.py
          git diff --quiet -- buildVars.py && exit 0
          git commit -am 'chore: sync addon_changelog with changelog.md'
          git push origin "$BRANCH"

      # The store shows addon_changelog through gettext, which needs the zh_TW
      # .po entry's msgid to match the current English text exactly, so each
      # release needs a fresh translation. Claude only produces the translated
      # plain text (written outside the repo); scripts/update_po_changelog.py
      # owns all .po edits and recomputes the msgid itself. Failures here are
      # surfaced as a warning, never block the English sync (the store then
      # falls back to English, the status quo), and retry on the next push.
      - name: Check whether the zh_TW changelog translation is current
        id: po
        if: ${{ steps.pr.outputs.branch != '' }}
        run: |
          if python3 scripts/update_po_changelog.py --check; then
            echo "needed=false" >> "$GITHUB_OUTPUT"
          else
            echo "needed=true" >> "$GITHUB_OUTPUT"
            python3 scripts/sync_addon_changelog.py --dry-run > "$RUNNER_TEMP/changelog_en.txt"
          fi
      # claude-code-action does not run on push-triggered workflows
      # ("Unsupported event type: push"), so call the Claude CLI in headless
      # mode instead. The changelog text derives from PR titles, i.e.
      # untrusted input, so treat the model as injectable: Write is scoped to
      # the runner temp dir (RUNNER_TEMP on hosted runners) and the apply step
      # additionally resets the workspace before executing anything from it.
      # The CLI install lives inside this step so an install failure is also
      # absorbed by continue-on-error rather than failing the job.
      - name: Translate the changelog to zh_TW with Claude
        id: translate
        if: ${{ steps.po.outputs.needed == 'true' }}
        continue-on-error: true
        timeout-minutes: 10
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          curl -fsSL https://claude.ai/install.sh | bash
          export PATH="$HOME/.local/bin:$PATH"
          prompt=$(cat <<EOF
          Translate the NVDA add-on store changelog at
          $RUNNER_TEMP/changelog_en.txt into Traditional Chinese (Taiwan, 臺灣正體中文).
          Rules:
          - Translate line by line: the output must have exactly the same number of
            lines as the input, with the same "- " bullet prefixes preserved.
          - Keep version numbers and dates (e.g. "2.0.0 (2026-06-10)") unchanged.
          - Use half-width parentheses with a single space before "(", matching the
            existing style in addon/locale/zh_TW/LC_MESSAGES/nvda.po.
          - Keep terminology and punctuation consistent with the existing msgstr
            translations in addon/locale/zh_TW/LC_MESSAGES/nvda.po and with
            addon/doc/zh_TW/readme.md.
          Write ONLY the translated plain text (no commentary, no code fences) to
          $RUNNER_TEMP/changelog_zh_TW.txt using the Write tool.
          Do not modify any file inside the repository.
          EOF
          )
          # --add-dir is required as well: file tools only reach the working
          # directory tree by default, and RUNNER_TEMP lives outside it.
          claude -p "$prompt" --add-dir "$RUNNER_TEMP" \
            --allowedTools 'Read,Glob,Grep,Write(//home/runner/work/_temp/**)'
      - name: Apply the translation to nvda.po
        id: apply
        if: ${{ steps.po.outputs.needed == 'true' && steps.translate.outcome == 'success' }}
        continue-on-error: true
        env:
          BRANCH: ${{ steps.pr.outputs.branch }}
        run: |
          # Don't trust the workspace after the model ran against untrusted
          # changelog content: discard any stray change before executing repo
          # scripts and committing (the translation file lives outside it).
          if [ -n "$(git status --porcelain)" ]; then
            echo "::warning title=workspace modified during translation::discarding stray changes"
            git restore .
            git clean -fdq
          fi
          sudo apt-get update -y && sudo apt-get install -y gettext
          test -s "$RUNNER_TEMP/changelog_zh_TW.txt"
          python3 scripts/update_po_changelog.py --apply "$RUNNER_TEMP/changelog_zh_TW.txt"
          msgfmt --check --output-file=/dev/null addon/locale/zh_TW/LC_MESSAGES/nvda.po
          git add addon/locale/zh_TW/LC_MESSAGES/nvda.po
          git diff --cached --quiet && exit 0
          git commit -m 'chore: translate addon_changelog to zh_TW'
          git push origin "$BRANCH"
      - name: Surface translation failure
        if: >-
          steps.po.outputs.needed == 'true' &&
          (steps.translate.outcome != 'success' || steps.apply.outcome != 'success')
        run: >-
          echo "::warning title=zh_TW changelog translation failed::The store
          changelog will fall back to English; the job retries on the next push
          to main."
