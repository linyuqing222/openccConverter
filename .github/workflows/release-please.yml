name: release-please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  # Maintain the rolling "release PR" (CHANGELOG + version bump). When that PR is
  # merged, this step also creates the git tag and the GitHub Release.
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # Tags created by release-please use the GITHUB_TOKEN, so they do not trigger
  # the tag-based `build addon` workflow. Build and attach the artifacts here
  # instead, only once a release has actually been cut.
  publish:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Install dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y gettext
          uv sync
      - name: Build add-on
        run: uv run scons && uv run scons pot
      - name: Attach artifacts and checksum to the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: |
          checksum="$(sha256sum *.nvda-addon)"
          gh release upload "$TAG" *.nvda-addon *.pot --clobber
          gh release view "$TAG" --json body -q .body > body.md
          {
            printf '\n\n---\n\nSHA256:\n\n'
            printf '```\n%s\n```\n' "$checksum"
          } >> body.md
          gh release edit "$TAG" --notes-file body.md
